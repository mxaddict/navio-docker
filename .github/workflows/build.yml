name: docker

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:
    # Instant trigger: send a navio-core-release event to build immediately.
    #   gh api repos/mxaddict/navio-docker/dispatches \
    #       -f event_type=navio-core-release
    repository_dispatch:
        types: [navio-core-release]
    schedule:
        # Poll every 6h; the build is skipped unless the release version changed.
        - cron: '0 */6 * * *'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write # create the built/<version> sentinel tag

env:
    # Docker Hub repository to publish to once deploy is enabled (TODO).
    IMAGE_NAME: mxaddict/navio

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Resolve navio-core release version
              id: ver
              run: |
                  # The version that the Dockerfile will bundle (newest release
                  # that ships binaries). Tag the image with it, sans leading "v".
                  tag="$(curl -fsSL \
                      https://api.github.com/repos/nav-io/navio-core/releases?per_page=30 \
                      | tr -d '\000-\037' \
                      | jq -r 'map(select(any(.assets[]?; .name | endswith("x86_64-linux-gnu.tar.gz")))) | .[0].tag_name')"
                  echo "navio=${tag#v}" >> "$GITHUB_OUTPUT"
                  echo "resolved navio version: ${tag#v}"

            - name: Decide whether to build
              id: decide
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  ver='${{ steps.ver.outputs.navio }}'
                  case "${{ github.event_name }}" in
                      schedule | repository_dispatch)
                          # Only build when this release has not been built yet.
                          if gh api "repos/${{ github.repository }}/git/ref/tags/built/${ver}" >/dev/null 2>&1; then
                              echo "navio ${ver} already built — skipping"
                              echo "build=false" >> "$GITHUB_OUTPUT"
                          else
                              echo "new navio release ${ver} — building"
                              echo "build=true" >> "$GITHUB_OUTPUT"
                          fi
                          ;;
                      *)
                          # push / pull_request / manual always build (test).
                          echo "build=true" >> "$GITHUB_OUTPUT"
                          ;;
                  esac

            - name: Set up QEMU
              if: steps.decide.outputs.build == 'true'
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              if: steps.decide.outputs.build == 'true'
              uses: docker/setup-buildx-action@v4

            - name: Docker metadata
              id: meta
              if: steps.decide.outputs.build == 'true'
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=${{ steps.ver.outputs.navio }}
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=ref,event=pr
                      type=sha

            # TODO(deploy): log in to Docker Hub before enabling push.
            # Requires repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN.
            # - name: Log in to Docker Hub
            #   if: steps.decide.outputs.build == 'true' && github.event_name != 'pull_request'
            #   uses: docker/login-action@v4
            #   with:
            #       username: ${{ secrets.DOCKERHUB_USERNAME }}
            #       password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build (test, no push)
              if: steps.decide.outputs.build == 'true'
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  # TODO(deploy): set push to `github.event_name != 'pull_request'`
                  # once Docker Hub credentials are configured above.
                  push: false
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  annotations: ${{ steps.meta.outputs.annotations }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  # TODO(deploy): supply-chain attestations for published images.
                  # provenance: true
                  # sbom: true

            # TODO(deploy): keep the Docker Hub repo overview in sync with README.
            # - name: Sync Docker Hub description
            #   if: steps.decide.outputs.build == 'true' && github.event_name != 'pull_request'
            #   uses: peter-evans/dockerhub-description@v5
            #   with:
            #       username: ${{ secrets.DOCKERHUB_USERNAME }}
            #       password: ${{ secrets.DOCKERHUB_TOKEN }}
            #       repository: ${{ env.IMAGE_NAME }}
            #       short-description: "Thin Navio full-node image built from official release binaries"

            - name: Record built release
              # Mark this release as built so scheduled/dispatch polls skip it.
              if: steps.decide.outputs.build == 'true' && github.event_name != 'pull_request'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  ver='${{ steps.ver.outputs.navio }}'
                  gh api -X POST "repos/${{ github.repository }}/git/refs" \
                      -f ref="refs/tags/built/${ver}" \
                      -f sha="${{ github.sha }}" \
                      && echo "tagged built/${ver}" \
                      || echo "built/${ver} already exists — nothing to do"

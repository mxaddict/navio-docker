name: docker

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:
    schedule:
        # Weekly rebuild to pick up new navio-core releases (Mon 06:00 UTC).
        - cron: '0 6 * * 1'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    # Docker Hub repository to publish to once deploy is enabled (TODO).
    IMAGE_NAME: mxaddict/navio

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha
                      type=raw,value=latest,enable={{is_default_branch}}

            # TODO(deploy): log in to Docker Hub before enabling push.
            # Requires repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN.
            # - name: Log in to Docker Hub
            #   if: github.event_name != 'pull_request'
            #   uses: docker/login-action@v3
            #   with:
            #       username: ${{ secrets.DOCKERHUB_USERNAME }}
            #       password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build (test, no push)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  # TODO(deploy): set push to `github.event_name != 'pull_request'`
                  # once Docker Hub credentials are configured above.
                  push: false
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
